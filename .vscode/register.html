<!DOCTYPE html>

<html lang="en">
<head> <link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - ShopSphere</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    background: linear-gradient(135deg,#6366f1,#8b5cf6);
    min-height:100vh;
}

.register-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px;
}

.register-card{
    background:white;
    width:450px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.register-card h1{
    text-align:center;
    margin-bottom:10px;
    color:#0f172a;
}

.register-card p{
    text-align:center;
    color:#64748b;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-weight:500;
    color:#0f172a;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:10px;
    outline:none;
    font-size:15px;
}

.input-group input:focus{
    border-color:#6366f1;
}

.register-btn{
    width:100%;
    padding:14px;
    background:#6366f1;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.register-btn:hover{
    background:#4f46e5;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#6366f1;
    text-decoration:none;
    font-weight:500;
}

</style>

</head>

<body>

<div class="register-container">

```
<div class="register-card">

    <h1>Create Account</h1>

    <p>Join ShopSphere and start shopping today</p>

    <form>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Create a password" required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm password" required>
        </div>

        <button type="submit" class="register-btn">
            Create Account
        </button>

    </form>

    <div class="login-link">
        <p>
            Already have an account?
            <a href="login.html">Login</a>
        </p>
    </div>

</div>
```

</div>

</body>
</html>
