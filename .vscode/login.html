<!DOCTYPE html>

<html lang="en">
<head> <link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - ShopSphere</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    background: linear-gradient(135deg,#6366f1,#8b5cf6);
    min-height:100vh;
}

.login-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-card{
    background:white;
    width:400px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.login-card h1{
    text-align:center;
    margin-bottom:10px;
    color:#0f172a;
}

.login-card p{
    text-align:center;
    color:gray;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-weight:500;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:10px;
    outline:none;
}

.input-group input:focus{
    border-color:#6366f1;
}

.login-btn{
    width:100%;
    padding:14px;
    background:#6366f1;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.login-btn:hover{
    background:#4f46e5;
}

.links{
    margin-top:20px;
    text-align:center;
}

.links a{
    text-decoration:none;
    color:#6366f1;
}

</style>

</head>

<body>

<div class="login-container">

```
<div class="login-card">

    <h1>Welcome Back</h1>

    <p>Login to your account</p>

    <form>

        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

    </form>

    <div class="links">
        <p>
            Don't have an account?
            <a href="register.html">Register</a>
        </p>
    </div>

</div>
```

</div>

</body>
</html>
